<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나만의 냉장고 - AI 요리 추천</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-container">
      <a href="home.html" class="logo">
        <div class="logo-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
            <rect x="5" y="3" width="14" height="18" rx="2" ry="2"/>
            <line x1="9" y1="7" x2="15" y2="7"/>
          </svg>
        </div>
        <h1 class="logo-text">나만의 냉장고</h1>
      </a>

      <div class="header-actions">
        <button class="btn btn-outline btn-icon notification-btn" onclick="app.toggleNotificationPanel()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          <span id="notificationCount" class="notification-badge" style="display: none;">0</span>
        </button>

        <div class="user-menu">
          <button class="btn btn-outline user-menu-trigger" onclick="app.toggleUserMenu()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            <span id="userName">사용자</span>
            <span id="userLevelBadge" class="badge badge-level">Lv.1</span>
          </button>
          <div class="user-menu-dropdown" id="userMenuDropdown">
            <div class="user-menu-header">내 계정</div>
            <div class="user-menu-item disabled">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                <polyline points="22,6 12,13 2,6"/>
              </svg>
              <span id="userEmail">user@example.com</span>
            </div>
            <div class="user-menu-divider"></div>
            <a href="profile.html" class="user-menu-item">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
              <span>내 정보</span>
            </a>
            <div class="user-menu-divider"></div>
            <div class="user-menu-item logout" onclick="app.logout()">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                <polyline points="16 17 21 12 16 7"/>
                <line x1="21" y1="12" x2="9" y2="12"/>
              </svg>
              <span>로그아웃</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- Navigation -->
  <nav class="nav">
    <div class="nav-container">
      <a href="home.html" class="nav-link" data-page="home">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        </svg>
        홈
      </a>
      <a href="ingredients.html" class="nav-link" data-page="ingredients">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="5" y="3" width="14" height="18" rx="2" ry="2"/>
          <line x1="9" y1="7" x2="15" y2="7"/>
        </svg>
        내 냉장고
      </a>
      <a href="recipes.html" class="nav-link" data-page="recipes">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M6 13.87A4 4 0 0 1 7.41 6a5.11 5.11 0 0 1 1.05-1.54 5 5 0 0 1 7.08 0A5.11 5.11 0 0 1 16.59 6 4 4 0 0 1 18 13.87V21H6Z"/>
        </svg>
        요리 추천
      </a>
      <a href="community.html" class="nav-link" data-page="community">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        커뮤니티
      </a>
      <a href="food-mbti.html" class="nav-link" data-page="food-mbti">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/>
          <path d="M7 2v20"/>
          <path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/>
        </svg>
        음식 MBTI
      </a>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="main-content">
    <div class="section-header">
      <div>
        <h2 class="section-title" style="background: linear-gradient(to right, #059669, #10b981); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">AI 요리 추천</h2>
        <p class="section-subtitle">보유한 재료로 만들 수 있는 요리를 추천받으세요</p>
      </div>
    </div>

    <!-- 재료 선택 -->
    <div class="card shadow-md mb-6" style="border-left: 4px solid #10b981;">
      <div class="card-header" style="background: linear-gradient(to right, #d1fae5, #a7f3d0);">
        <h3 class="card-title flex items-center gap-2">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#059669" stroke-width="2">
            <path d="M6 13.87A4 4 0 0 1 7.41 6a5.11 5.11 0 0 1 1.05-1.54 5 5 0 0 1 7.08 0A5.11 5.11 0 0 1 16.59 6 4 4 0 0 1 18 13.87V21H6Z"/>
          </svg>
          사용할 재료 선택
        </h3>
        <p class="card-description">추천받을 요리에 사용할 재료를 선택하세요</p>
      </div>
      <div class="card-content">
        <div id="ingredientSelection"></div>
      </div>
    </div>

    <!-- 추천 버튼 -->
    <div class="flex justify-center mb-6">
      <button id="recommendBtn" class="btn btn-success shadow-lg" style="font-size: 1.125rem; padding: 0.75rem 2rem;" onclick="handleRecommend()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
        </svg>
        AI 요리 추천받기
      </button>
    </div>

    <!-- 추천 레시피 -->
    <div id="recipesContainer"></div>
  </main>

  <!-- Notification Panel -->
  <div id="notificationOverlay" class="notification-overlay"></div>
  <div id="notificationPanel" class="notification-panel">
    <h3 class="text-xl font-bold mb-4 flex items-center gap-2">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
      </svg>
      유통기한 알림
    </h3>
    <div id="notificationList"></div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast">
    <span class="toast-message"></span>
  </div>

  <script src="js/app.js"></script>
  <script>
    let selectedIngredients = [];

    async function renderIngredientSelection() {
      const ingredients = await app.loadIngredients();
      const container = document.getElementById('ingredientSelection');

      if (ingredients.length === 0) {
        container.innerHTML = '<p class="text-sm text-gray-500">등록된 재료가 없습니다. 먼저 재료를 추가해주세요.</p>';
        return;
      }

      // 기본적으로 모든 재료 선택
      selectedIngredients = ingredients.map(i => i.id);

      container.innerHTML = `
        <div class="flex gap-2 mb-4">
          <button class="btn btn-outline" style="font-size: 0.875rem; padding: 0.5rem 1rem;" onclick="selectAllIngredients()">전체 선택</button>
          <button class="btn btn-outline" style="font-size: 0.875rem; padding: 0.5rem 1rem;" onclick="deselectAllIngredients()">선택 해제</button>
        </div>
        
        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3">
          ${ingredients.map(ingredient => `
            <div class="flex items-center gap-2">
              <input type="checkbox" id="ing-${ingredient.id}" value="${ingredient.id}" checked onchange="toggleIngredient('${ingredient.id}')">
              <label for="ing-${ingredient.id}" class="text-sm cursor-pointer">${ingredient.name}</label>
            </div>
          `).join('')}
        </div>
      `;
    }

    function toggleIngredient(id) {
      if (selectedIngredients.includes(id)) {
        selectedIngredients = selectedIngredients.filter(i => i !== id);
      } else {
        selectedIngredients.push(id);
      }
    }

    async function selectAllIngredients() {
      const ingredients = await app.loadIngredients();
      selectedIngredients = ingredients.map(i => i.id);
      document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = true);
    }

    function deselectAllIngredients() {
      selectedIngredients = [];
      document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
    }

    function handleRecommend() {
      const btn = document.getElementById('recommendBtn');
      const originalContent = btn.innerHTML;

      // 로딩 상태
      btn.disabled = true;
      btn.innerHTML = `
        <div class="spinner"></div>
        AI가 레시피를 찾는 중...
      `;

      setTimeout(() => {
        const recipes = app.recommendRecipes(selectedIngredients);
        btn.disabled = false;
        btn.innerHTML = originalContent;

        if (recipes.length > 0) {
          renderRecipes(recipes);
          document.getElementById('recipesContainer').scrollIntoView({ behavior: 'smooth' });
        }
      }, 1500);
    }

    function renderRecipes(recipes) {
      const container = document.getElementById('recipesContainer');

      if (recipes.length === 0) return;

      container.innerHTML = `
        <h3 class="text-xl font-semibold mb-4" style="color: #064e3b;">✨ 추천 레시피</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
          ${recipes.map(recipe => `
            <div class="card recipe-card">
              <div class="card-header">
                <div class="flex items-start justify-between mb-2">
                  <h3 class="card-title text-lg" style="color: #064e3b;">${recipe.name}</h3>
                  <span class="badge badge-success">${recipe.difficulty}</span>
                </div>
                <p class="card-description">${recipe.description}</p>
              </div>
              <div class="card-content" style="display: flex; flex-direction: column; gap: 1rem;">
                <div class="flex gap-4 text-sm text-gray-600">
                  <div class="flex items-center gap-1">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <circle cx="12" cy="12" r="10"/>
                      <polyline points="12 6 12 12 16 14"/>
                    </svg>
                    ${recipe.cookTime}
                  </div>
                  <div class="flex items-center gap-1">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                      <circle cx="9" cy="7" r="4"/>
                    </svg>
                    ${recipe.servings}
                  </div>
                </div>

                <div>
                  <h4 class="font-medium mb-2">재료</h4>
                  <ul class="text-sm" style="display: flex; flex-direction: column; gap: 0.25rem;">
                    ${recipe.ingredients.map(ing => `<li class="text-gray-600">• ${ing}</li>`).join('')}
                  </ul>
                </div>

                <div>
                  <h4 class="font-medium mb-2">조리 순서</h4>
                  <ol class="text-sm" style="display: flex; flex-direction: column; gap: 0.25rem;">
                    ${recipe.steps.map((step, idx) => `<li class="text-gray-600">${idx + 1}. ${step}</li>`).join('')}
                  </ol>
                </div>
              </div>
            </div>
          `).join('')}
        </div>
      `;
    }

    // 알림 표시
    function renderNotifications() {
      const expiring = app.checkExpiringItems();
      const notificationList = document.getElementById('notificationList');
      
      if (expiring.length === 0) {
        notificationList.innerHTML = '<p class="text-sm text-gray-500">유통기한 임박 재료가 없습니다.</p>';
      } else {
        notificationList.innerHTML = expiring.map(item => `
          <div class="p-3 mb-2 rounded-lg" style="background: #fee2e2;">
            <p class="text-sm font-medium">${item.name}</p>
            <p class="text-xs" style="color: #991b1b;">
              유통기한: ${app.formatDate(item.expiryDate)}
            </p>
          </div>
        `).join('');
      }
    }

    document.addEventListener('DOMContentLoaded', async function() {
      if (!(await app.requireAuth())) {
        return;
      }
      await renderIngredientSelection();
      renderNotifications();
    });

    // 드롭다운 닫기 (외부 클릭)
    document.addEventListener('click', function(e) {
      const userMenu = document.querySelector('.user-menu');
      const dropdown = document.getElementById('userMenuDropdown');

      if (userMenu && dropdown && !userMenu.contains(e.target)) {
        dropdown.classList.remove('active');
      }
    });
  </script>
</body>
</html>
