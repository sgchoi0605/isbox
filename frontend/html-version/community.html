<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나만의 냉장고 - 커뮤니티</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <div class="header-container">
      <a href="home.html" class="logo">
        <div class="logo-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
            <rect x="5" y="3" width="14" height="18" rx="2" ry="2"/>
            <line x1="9" y1="7" x2="15" y2="7"/>
          </svg>
        </div>
        <h1 class="logo-text">나만의 냉장고</h1>
      </a>

      <div class="header-actions">
        <button class="btn btn-outline btn-icon notification-btn" onclick="app.toggleNotificationPanel()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          <span id="notificationCount" class="notification-badge" style="display: none;">0</span>
        </button>

        <div class="user-menu">
          <button class="btn btn-outline user-menu-trigger" onclick="app.toggleUserMenu()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            <span id="userName">사용자</span>
            <span id="userLevelBadge" class="badge badge-level">Lv.1</span>
          </button>
          <div class="user-menu-dropdown" id="userMenuDropdown">
            <div class="user-menu-header">내 계정</div>
            <div class="user-menu-item disabled">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                <polyline points="22,6 12,13 2,6"/>
              </svg>
              <span id="userEmail">user@example.com</span>
            </div>
            <div class="user-menu-divider"></div>
            <a href="profile.html" class="user-menu-item">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
              <span>내 정보</span>
            </a>
            <div class="user-menu-divider"></div>
            <div class="user-menu-item logout" onclick="app.logout()">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                <polyline points="16 17 21 12 16 7"/>
                <line x1="21" y1="12" x2="9" y2="12"/>
              </svg>
              <span>로그아웃</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </header>

  <nav class="nav">
    <div class="nav-container">
      <a href="home.html" class="nav-link" data-page="home">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        </svg>
        홈
      </a>
      <a href="ingredients.html" class="nav-link" data-page="ingredients">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="5" y="3" width="14" height="18" rx="2" ry="2"/>
          <line x1="9" y1="7" x2="15" y2="7"/>
        </svg>
        내 냉장고
      </a>
      <a href="recipes.html" class="nav-link" data-page="recipes">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M6 13.87A4 4 0 0 1 7.41 6a5.11 5.11 0 0 1 1.05-1.54 5 5 0 0 1 7.08 0A5.11 5.11 0 0 1 16.59 6 4 4 0 0 1 18 13.87V21H6Z"/>
        </svg>
        요리 추천
      </a>
      <a href="community.html" class="nav-link" data-page="community">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        커뮤니티
      </a>
      <a href="food-mbti.html" class="nav-link" data-page="food-mbti">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/>
          <path d="M7 2v20"/>
          <path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/>
        </svg>
        음식 MBTI
      </a>
    </div>
  </nav>

  <main class="main-content">
    <div class="section-header">
      <div>
        <h2 class="section-title" style="background: linear-gradient(to right, #9333ea, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">커뮤니티</h2>
        <p class="section-subtitle">식재료를 나누고 교환하며 이웃과 연결해보세요.</p>
      </div>
      <button class="btn btn-secondary shadow-md" onclick="app.openModal('addPostModal')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="12" y1="5" x2="12" y2="19"/>
          <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        글쓰기
      </button>
    </div>

    <div class="tabs mb-6">
      <div class="tabs-list" style="background: #f3e8ff; max-width: fit-content;">
        <button class="tab-trigger active" data-tab="all" onclick="filterPosts('all')">전체</button>
        <button class="tab-trigger" data-tab="share" onclick="filterPosts('share')">나눔</button>
        <button class="tab-trigger" data-tab="exchange" onclick="filterPosts('exchange')">교환</button>
      </div>
    </div>

    <form class="community-search mb-6" onsubmit="handleSearchPosts(event)">
      <input
        type="text"
        id="postSearchInput"
        class="form-input"
        placeholder="Search by title"
        maxlength="100"
      >
      <button type="submit" class="btn btn-outline">Search</button>
    </form>

    <div id="postsContainer"></div>
    <div id="postsPagination" class="community-pagination"></div>
  </main>

  <div id="addPostModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title">게시글 작성</h3>
        <button class="modal-close" onclick="app.closeModal('addPostModal')">&times;</button>
      </div>

      <form id="addPostForm" onsubmit="handleAddPost(event)">
        <div class="form-group">
          <label class="form-label" for="type">유형*</label>
          <select id="type" class="form-select" required>
            <option value="share">나눔</option>
            <option value="exchange">교환</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label" for="title">제목*</label>
          <input type="text" id="title" class="form-input" placeholder="예: 남은 채소 나눔합니다" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="content">내용*</label>
          <textarea id="content" class="form-textarea" placeholder="자세한 내용을 입력해주세요" required></textarea>
        </div>

        <div class="form-group">
          <label class="form-label" for="location">거래 지역</label>
          <input type="text" id="location" class="form-input" placeholder="예: 서울 강남구">
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-outline" onclick="app.closeModal('addPostModal')">취소</button>
          <button type="submit" class="btn btn-secondary">등록하기</button>
        </div>
      </form>
    </div>
  </div>

  <div id="notificationOverlay" class="notification-overlay"></div>
  <div id="notificationPanel" class="notification-panel">
    <h3 class="text-xl font-bold mb-4 flex items-center gap-2">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
      </svg>
      유통기한 알림
    </h3>
    <div id="notificationList"></div>
  </div>

  <div id="toast" class="toast">
    <span class="toast-message"></span>
  </div>

  <script src="js/app.js"></script>
  <script>
    let currentFilter = 'all';
    let currentSearch = '';
    let currentPage = 1;
    const pageSize = 9;

    function updateFilterButtons(filter) {
      const triggers = document.querySelectorAll('.tab-trigger');
      triggers.forEach(trigger => {
        trigger.classList.remove('active');
        if (trigger.dataset.tab === filter) {
          trigger.classList.add('active');
        }
      });
    }

    function renderPagination(pagination) {
      const paginationContainer = document.getElementById('postsPagination');
      if (!paginationContainer) {
        return;
      }

      const totalPages = Number(pagination?.totalPages || 0);
      const page = Number(pagination?.page || 1);

      if (totalPages <= 0) {
        paginationContainer.innerHTML = '';
        return;
      }

      const maxVisibleButtons = 7;
      let startPage = Math.max(1, page - Math.floor(maxVisibleButtons / 2));
      let endPage = Math.min(totalPages, startPage + maxVisibleButtons - 1);
      startPage = Math.max(1, endPage - maxVisibleButtons + 1);

      const numberButtons = [];
      for (let i = startPage; i <= endPage; i += 1) {
        const isActive = i === page;
        numberButtons.push(`
          <button
            class="btn ${isActive ? 'btn-secondary' : 'btn-outline'} btn-sm community-page-btn"
            onclick="goToPage(${i})"
            ${isActive ? 'disabled' : ''}
          >
            ${i}
          </button>
        `);
      }

      paginationContainer.innerHTML = `
        <button
          class="btn btn-outline btn-sm community-page-btn"
          onclick="goToPage(${page - 1})"
          ${pagination.hasPrev ? '' : 'disabled'}
        >
          Prev
        </button>
        ${numberButtons.join('')}
        <button
          class="btn btn-outline btn-sm community-page-btn"
          onclick="goToPage(${page + 1})"
          ${pagination.hasNext ? '' : 'disabled'}
        >
          Next
        </button>
      `;
    }

    async function renderPosts() {
      const container = document.getElementById('postsContainer');

      try {
        const { posts, pagination } = await app.loadCommunityPosts({
          filter: currentFilter,
          search: currentSearch,
          page: currentPage,
          size: pageSize
        });
        currentPage = Number(pagination?.page || 1);
        const currentUserId = Number(app.state.user?.memberId || 0);

        if (posts.length === 0) {
          container.innerHTML = `
            <div class="card shadow-md">
              <div class="card-content empty-state">
                <div class="empty-icon">📭</div>
                <p class="text-gray-500">아직 등록된 게시글이 없습니다.</p>
                <p class="text-sm text-gray-400 mt-1">첫 번째 게시글을 작성해보세요!</p>
              </div>
            </div>
          `;
          if (currentSearch.length > 0) {
            const primaryMessage = container.querySelector('.text-gray-500');
            const secondaryMessage = container.querySelector('.text-gray-400');
            if (primaryMessage) {
              primaryMessage.textContent = 'No search results found.';
            }
            if (secondaryMessage) {
              secondaryMessage.textContent = 'Try a different keyword.';
            }
          }
          renderPagination(pagination);
          return;
        }

        container.innerHTML = `
          <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            ${posts.map(post => `
              <div class="card post-card">
                <div class="card-header">
                  <div class="flex items-start justify-between mb-2">
                    <div class="flex-1">
                      <div class="flex items-center gap-2 mb-2">
                        <span class="badge ${post.type === 'share' ? 'badge-primary' : 'badge-secondary'}">
                          ${post.type === 'share' ? '나눔' : '교환'}
                        </span>
                        ${post.status === 'available' ? '<span class="badge" style="background: #dcfce7; color: #166534; border: 1px solid #86efac;">거래가능</span>' : ''}
                      </div>
                      <h3 class="card-title text-lg text-gray-900">${post.title}</h3>
                    </div>
                  </div>
                </div>
                <div class="card-content" style="display: flex; flex-direction: column; gap: 0.75rem;">
                  <p class="card-description">${post.content}</p>

                  <div style="display: flex; flex-direction: column; gap: 0.5rem; font-size: 0.875rem; color: #4b5563;">
                    <div class="flex items-center gap-2">
                      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#9333ea" stroke-width="2">
                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                        <circle cx="12" cy="10" r="3"/>
                      </svg>
                      ${post.location || '-'}
                    </div>
                    <div class="flex items-center gap-2">
                      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#9333ea" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                      </svg>
                      ${post.authorName || '-'}
                    </div>
                    <div class="flex items-center gap-2">
                      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#9333ea" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <polyline points="12 6 12 12 16 14"/>
                      </svg>
                      ${app.getTimeAgo(post.createdAt)}
                    </div>
                  </div>

                  <div style="display: flex; gap: 0.5rem;">
                    <button class="btn btn-secondary" style="flex: 1;">연락하기</button>
                    ${currentUserId && Number(post.memberId) === currentUserId ? `
                      <button
                        class="btn btn-outline"
                        style="flex: 1; color: #dc2626; border-color: #fecaca;"
                        onclick="handleDeletePost(${Number(post.postId)})"
                      >
                        삭제
                      </button>
                    ` : ''}
                  </div>
                </div>
              </div>
            `).join('')}
          </div>
        `;
        renderPagination(pagination);
      } catch (error) {
        container.innerHTML = `
          <div class="card shadow-md">
            <div class="card-content empty-state">
              <p class="text-gray-500">게시글을 불러오지 못했습니다.</p>
            </div>
          </div>
        `;
        const paginationContainer = document.getElementById('postsPagination');
        if (paginationContainer) {
          paginationContainer.innerHTML = '';
        }
        app.showToast(error.message || '게시글을 불러오지 못했습니다.', 'error');
      }
    }

    async function goToPage(page) {
      const nextPage = Number(page);
      if (!Number.isInteger(nextPage) || nextPage < 1 || nextPage === currentPage) {
        return;
      }

      currentPage = nextPage;
      await renderPosts();
    }

    async function filterPosts(filter) {
      currentFilter = filter;
      currentPage = 1;
      updateFilterButtons(filter);
      await renderPosts();
    }

    async function handleSearchPosts(event) {
      if (event) {
        event.preventDefault();
      }

      const input = document.getElementById('postSearchInput');
      currentSearch = input ? input.value.trim() : '';
      currentPage = 1;
      await renderPosts();
    }

    async function handleAddPost(event) {
      event.preventDefault();

      const post = {
        type: document.getElementById('type').value,
        title: document.getElementById('title').value,
        content: document.getElementById('content').value,
        location: document.getElementById('location').value
      };

      try {
        await app.addCommunityPost(post);
        app.closeModal('addPostModal');
        document.getElementById('addPostForm').reset();
        await renderPosts();
      } catch (error) {
        app.showToast(error.message || '게시글 등록에 실패했습니다.', 'error');
      }
    }

    async function handleDeletePost(postId) {
      if (!confirm('이 게시글을 삭제하시겠습니까?')) {
        return;
      }

      try {
        await app.deleteCommunityPost(postId);
        await renderPosts();
      } catch (error) {
        app.showToast(error.message || '게시글 삭제에 실패했습니다.', 'error');
      }
    }

    function renderNotifications() {
      const expiring = app.checkExpiringItems();
      const notificationList = document.getElementById('notificationList');

      if (expiring.length === 0) {
        notificationList.innerHTML = '<p class="text-sm text-gray-500">유통기한 임박 재료가 없습니다.</p>';
      } else {
        notificationList.innerHTML = expiring.map(item => `
          <div class="p-3 mb-2 rounded-lg" style="background: #fee2e2;">
            <p class="text-sm font-medium">${item.name}</p>
            <p class="text-xs" style="color: #991b1b;">
              유통기한: ${app.formatDate(item.expiryDate)}
            </p>
          </div>
        `).join('');
      }
    }

    document.addEventListener('DOMContentLoaded', async function() {
      await app.checkAuth();
      updateFilterButtons(currentFilter);
      await renderPosts();
      renderNotifications();
    });

    document.addEventListener('click', function(e) {
      const userMenu = document.querySelector('.user-menu');
      const dropdown = document.getElementById('userMenuDropdown');

      if (userMenu && dropdown && !userMenu.contains(e.target)) {
        dropdown.classList.remove('active');
      }
    });
  </script>
</body>
</html>
