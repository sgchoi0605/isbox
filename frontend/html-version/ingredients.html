<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나만의 냉장고 - 내 냉장고</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-container">
      <a href="home.html" class="logo">
        <div class="logo-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
            <rect x="5" y="3" width="14" height="18" rx="2" ry="2"/>
            <line x1="9" y1="7" x2="15" y2="7"/>
          </svg>
        </div>
        <h1 class="logo-text">나만의 냉장고</h1>
      </a>

      <div class="header-actions">
        <button class="btn btn-outline btn-icon notification-btn" onclick="app.toggleNotificationPanel()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          <span id="notificationCount" class="notification-badge" style="display: none;">0</span>
        </button>

        <div class="user-menu">
          <button class="btn btn-outline user-menu-trigger" onclick="app.toggleUserMenu()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            <span id="userName">사용자</span>
            <span id="userLevelBadge" class="badge badge-level">Lv.1</span>
          </button>
          <div class="user-menu-dropdown" id="userMenuDropdown">
            <div class="user-menu-header">내 계정</div>
            <div class="user-menu-item disabled">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                <polyline points="22,6 12,13 2,6"/>
              </svg>
              <span id="userEmail">user@example.com</span>
            </div>
            <div class="user-menu-divider"></div>
            <a href="profile.html" class="user-menu-item">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
              <span>내 정보</span>
            </a>
            <div class="user-menu-divider"></div>
            <div class="user-menu-item logout" onclick="app.logout()">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                <polyline points="16 17 21 12 16 7"/>
                <line x1="21" y1="12" x2="9" y2="12"/>
              </svg>
              <span>로그아웃</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- Navigation -->
  <nav class="nav">
    <div class="nav-container">
      <a href="home.html" class="nav-link" data-page="home">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        </svg>
        홈
      </a>
      <a href="ingredients.html" class="nav-link" data-page="ingredients">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="5" y="3" width="14" height="18" rx="2" ry="2"/>
          <line x1="9" y1="7" x2="15" y2="7"/>
        </svg>
        내 냉장고
      </a>
      <a href="recipes.html" class="nav-link" data-page="recipes">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M6 13.87A4 4 0 0 1 7.41 6a5.11 5.11 0 0 1 1.05-1.54 5 5 0 0 1 7.08 0A5.11 5.11 0 0 1 16.59 6 4 4 0 0 1 18 13.87V21H6Z"/>
        </svg>
        요리 추천
      </a>
      <a href="community.html" class="nav-link" data-page="community">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        커뮤니티
      </a>
      <a href="food-mbti.html" class="nav-link" data-page="food-mbti">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/>
          <path d="M7 2v20"/>
          <path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/>
        </svg>
        음식 MBTI
      </a>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="main-content">
    <div class="section-header">
      <div>
        <h2 class="section-title">내 냉장고</h2>
        <p class="section-subtitle">냉장고에 보관된 재료를 관리하세요</p>
      </div>
      <button class="btn btn-primary shadow-md" onclick="openAddIngredientModal()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="12" y1="5" x2="12" y2="19"/>
          <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        재료 추가
      </button>
    </div>

    <div id="ingredientsContainer"></div>
  </main>

  <!-- Add Ingredient Modal -->
  <div id="addIngredientModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="ingredientModalTitle" class="modal-title">새 재료 추가</h3>
        <button class="modal-close" onclick="closeIngredientModal()">&times;</button>
      </div>
      
      <form id="addIngredientForm" onsubmit="handleAddIngredient(event)">
        <div id="publicFoodSearchGroup" class="form-group">
          <label class="form-label" for="foodSearchKeyword">가공식품 영양정보 검색</label>
          <div class="flex gap-2">
            <input type="text" id="foodSearchKeyword" class="form-input" placeholder="예: 참치, 햄, 과자">
            <button type="button" class="btn btn-outline" onclick="handleSearchFood()">검색</button>
          </div>
          <div id="foodSearchResults" class="mt-2"></div>
          <div id="selectedFoodSummary" class="text-sm text-gray-500 mt-2"></div>
        </div>
        <div class="form-group">
          <label class="form-label" for="name">재료명*</label>
          <input type="text" id="name" class="form-input" placeholder="예: 양파" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="category">카테고리*</label>
          <select id="category" class="form-select" required>
            <option value="">카테고리 선택</option>
            <option value="채소">채소</option>
            <option value="과일">과일</option>
            <option value="육류">육류</option>
            <option value="해산물">해산물</option>
            <option value="유제품">유제품</option>
            <option value="조미료">조미료</option>
            <option value="기타">기타</option>
          </select>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div class="form-group">
            <label class="form-label" for="quantity">수량*</label>
            <input type="text" id="quantity" class="form-input" placeholder="예: 2" required>
          </div>

          <div class="form-group">
            <label class="form-label" for="unit">단위*</label>
            <select id="unit" class="form-select" required>
              <option value="">단위 선택</option>
              <option value="개">개</option>
              <option value="g">g</option>
              <option value="kg">kg</option>
              <option value="ml">ml</option>
              <option value="L">L</option>
              <option value="팩">팩</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="storage">보관 위치*</label>
          <select id="storage" class="form-select" required>
            <option value="">보관 위치 선택</option>
            <option value="fridge">냉장실</option>
            <option value="freezer">냉동실</option>
            <option value="roomTemp">실온</option>
            <option value="other">기타</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label" for="expiryDate">유통기한*</label>
          <input type="date" id="expiryDate" class="form-input" required>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-outline" onclick="closeIngredientModal()">취소</button>
          <button id="ingredientSubmitButton" type="submit" class="btn btn-primary">추가</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Notification Panel -->
  <div id="notificationOverlay" class="notification-overlay"></div>
  <div id="notificationPanel" class="notification-panel">
    <h3 class="text-xl font-bold mb-4 flex items-center gap-2">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
      </svg>
      유통기한 알림
    </h3>
    <div id="notificationList"></div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast">
    <span class="toast-message"></span>
  </div>

  <script src="js/app.js"></script>
  <script>
    const STORAGE_ORDER = ['fridge', 'freezer', 'roomTemp', 'other'];
    const STORAGE_LABELS = {
      fridge: '냉장실',
      freezer: '냉동실',
      roomTemp: '실온',
      other: '기타'
    };

    let ingredientListCache = [];
    let editingIngredientId = null;
    let foodSearchResults = [];
    let selectedFoodSnapshot = null;

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function normalizeStorage(value) {
      const raw = String(value ?? '').trim();
      const lower = raw.toLowerCase();

      if (lower === 'fridge' || raw === '냉장실') return 'fridge';
      if (lower === 'freezer' || raw === '냉동실') return 'freezer';
      if (lower === 'roomtemp' || lower === 'room_temp' || raw === '실온') return 'roomTemp';
      return 'other';
    }

    function getStorageLabel(value) {
      return STORAGE_LABELS[normalizeStorage(value)] || '기타';
    }

    function clearFoodSearchUi() {
      const keywordInput = document.getElementById('foodSearchKeyword');
      const results = document.getElementById('foodSearchResults');
      const summary = document.getElementById('selectedFoodSummary');

      if (keywordInput) keywordInput.value = '';
      if (results) results.innerHTML = '';
      if (summary) summary.textContent = '';

      foodSearchResults = [];
      selectedFoodSnapshot = null;
    }

    function setIngredientModalMode(isEdit) {
      const title = document.getElementById('ingredientModalTitle');
      const submitButton = document.getElementById('ingredientSubmitButton');
      const searchGroup = document.getElementById('publicFoodSearchGroup');

      if (title) title.textContent = isEdit ? '재료 수정' : '새 재료 추가';
      if (submitButton) submitButton.textContent = isEdit ? '저장' : '추가';
      if (searchGroup) searchGroup.style.display = isEdit ? 'none' : '';
    }

    function openAddIngredientModal() {
      editingIngredientId = null;
      setIngredientModalMode(false);
      clearFoodSearchUi();

      const form = document.getElementById('addIngredientForm');
      if (form) form.reset();

      app.openModal('addIngredientModal');
    }

    function closeIngredientModal() {
      editingIngredientId = null;
      setIngredientModalMode(false);
      clearFoodSearchUi();

      const form = document.getElementById('addIngredientForm');
      if (form) form.reset();

      app.closeModal('addIngredientModal');
    }

    function toNumberOrUndefined(value) {
      if (value === null || value === undefined || value === '') {
        return undefined;
      }
      const numberValue = Number(value);
      return Number.isNaN(numberValue) ? undefined : numberValue;
    }

    function renderFoodSearchItems(items) {
      const results = document.getElementById('foodSearchResults');
      if (!results) return;

      if (!items.length) {
        results.innerHTML = '<p class="text-sm text-gray-500 mt-2">검색 결과가 없습니다.</p>';
        return;
      }

      results.innerHTML = items.map((item, index) => `
        <div class="p-3 mt-2 rounded-lg border border-gray-200">
          <div class="flex items-start justify-between gap-2">
            <div>
              <p class="font-medium text-gray-900">${escapeHtml(item.foodName)}</p>
            </div>
            <button type="button" class="btn btn-outline" onclick="selectFoodResult(${index})">선택</button>
          </div>
        </div>
      `).join('');
    }

    async function handleSearchFood() {
      const keywordInput = document.getElementById('foodSearchKeyword');
      const results = document.getElementById('foodSearchResults');
      if (!keywordInput || !results) return;

      const keyword = keywordInput.value.trim();
      if (!keyword) {
        results.innerHTML = '<p class="text-sm text-gray-500 mt-2">검색어를 입력해주세요.</p>';
        return;
      }

      results.innerHTML = '<p class="text-sm text-gray-500 mt-2">검색 중...</p>';

      try {
        const foods = await app.searchProcessedFoods(keyword);
        foodSearchResults = Array.isArray(foods) ? foods : [];
        renderFoodSearchItems(foodSearchResults);
      } catch (error) {
        results.innerHTML = '<p class="text-sm text-red-500 mt-2">검색에 실패했습니다.</p>';
        app.showToast(error.message || '검색에 실패했습니다.', 'error');
      }
    }

    function selectFoodResult(index) {
      const food = foodSearchResults[index];
      if (!food) return;

      selectedFoodSnapshot = {
        publicFoodCode: food.foodCode || undefined,
        nutritionBasisAmount: food.nutritionBasisAmount || undefined,
        energyKcal: toNumberOrUndefined(food.energyKcal),
        proteinG: toNumberOrUndefined(food.proteinG),
        fatG: toNumberOrUndefined(food.fatG),
        carbohydrateG: toNumberOrUndefined(food.carbohydrateG),
        sugarG: toNumberOrUndefined(food.sugarG),
        sodiumMg: toNumberOrUndefined(food.sodiumMg),
        sourceName: food.sourceName || undefined,
        manufacturerName: food.manufacturerName || undefined,
        importYn: food.importYn || undefined,
        originCountryName: food.originCountryName || undefined,
        dataBaseDate: food.dataBaseDate || undefined
      };

      const nameInput = document.getElementById('name');
      const categoryInput = document.getElementById('category');
      const summary = document.getElementById('selectedFoodSummary');

      if (nameInput) nameInput.value = food.foodName || '';
      if (categoryInput && !categoryInput.value) categoryInput.value = '기타';
      if (summary) {
        summary.textContent = `선택됨: ${food.foodName || '-'} (${food.foodCode || '-'})`;
      }
    }

    function openEditIngredientModal(id) {
      const target = ingredientListCache.find(item => String(item.id) === String(id));
      if (!target) {
        app.showToast('수정할 재료를 찾지 못했습니다.', 'error');
        return;
      }

      editingIngredientId = String(target.id);
      setIngredientModalMode(true);
      clearFoodSearchUi();

      document.getElementById('name').value = target.name || '';
      document.getElementById('category').value = target.category || '';
      document.getElementById('quantity').value = target.quantity || '';
      document.getElementById('unit').value = target.unit || '';
      document.getElementById('storage').value = normalizeStorage(target.storage);
      document.getElementById('expiryDate').value = target.expiryDate || '';

      app.openModal('addIngredientModal');
    }

    async function renderIngredients() {
      const container = document.getElementById('ingredientsContainer');
      if (!container) return;

      container.innerHTML = `
        <div class="card shadow-md">
          <div class="card-content">
            <p class="text-sm text-gray-500">재료 목록을 불러오는 중...</p>
          </div>
        </div>
      `;

      try {
        const loaded = await app.loadIngredients();
        const normalized = (Array.isArray(loaded) ? loaded : []).map(item => ({
          ...item,
          id: String(item.id ?? item.ingredientId ?? ''),
          storage: normalizeStorage(item.storage)
        }));

        ingredientListCache = normalized.sort((a, b) => {
          const aDate = new Date(a.expiryDate || '').getTime();
          const bDate = new Date(b.expiryDate || '').getTime();
          return aDate - bDate;
        });
      } catch (error) {
        ingredientListCache = [];
        app.showToast(error.message || '재료 목록 로딩에 실패했습니다.', 'error');
      }

      if (!ingredientListCache.length) {
        container.innerHTML = `
          <div class="card shadow-md">
            <div class="card-content empty-state">
              <div class="empty-icon">❗</div>
              <p class="text-gray-500">등록된 재료가 없습니다.</p>
              <p class="text-sm text-gray-400 mt-1">재료 추가 버튼을 눌러 시작하세요.</p>
            </div>
          </div>
        `;
        return;
      }

      const grouped = { fridge: [], freezer: [], roomTemp: [], other: [] };
      ingredientListCache.forEach(item => {
        grouped[normalizeStorage(item.storage)].push(item);
      });

      container.innerHTML = STORAGE_ORDER
        .filter(storageKey => grouped[storageKey].length > 0)
        .map(storageKey => `
          <div class="card shadow-md storage-section mb-6">
            <div class="card-header storage-header">
              <h3 class="card-title">
                ${getStorageLabel(storageKey)}
                <span class="badge badge-outline ml-2">${grouped[storageKey].length}개</span>
              </h3>
            </div>
            <div class="card-content">
              <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                ${grouped[storageKey].map(item => `
                  <div class="ingredient-item">
                    <div class="flex items-start justify-between mb-2">
                      <div>
                        <h4 class="font-medium text-gray-900">${escapeHtml(item.name)}</h4>
                        <p class="text-sm text-gray-500">${escapeHtml(item.category)}</p>
                      </div>
                      <div class="flex items-center gap-1">
                        <button class="btn btn-icon" style="padding: 0.25rem; width: 2rem; height: 2rem; background: transparent; border: none;" onclick="openEditIngredientModal('${item.id}')">
                          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2">
                            <path d="M12 20h9"/>
                            <path d="M16.5 3.5a2.12 2.12 0 1 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/>
                          </svg>
                        </button>
                        <button class="btn btn-icon" style="padding: 0.25rem; width: 2rem; height: 2rem; background: transparent; border: none;" onclick="handleDeleteIngredient('${item.id}')">
                          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2">
                            <polyline points="3 6 5 6 21 6"/>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                          </svg>
                        </button>
                      </div>
                    </div>

                    <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                      <p class="text-sm font-medium text-gray-700">수량: ${escapeHtml(item.quantity)}${escapeHtml(item.unit)}</p>
                      <div class="flex items-center gap-2 text-gray-600">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2">
                          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                          <line x1="16" y1="2" x2="16" y2="6"/>
                          <line x1="8" y1="2" x2="8" y2="6"/>
                          <line x1="3" y1="10" x2="21" y2="10"/>
                        </svg>
                        <span class="text-sm">${escapeHtml(app.formatDate(item.expiryDate))}</span>
                      </div>
                      <span class="badge ${app.getExpiryBadgeClass(item.expiryDate)}">${escapeHtml(app.getExpiryText(item.expiryDate))}</span>
                      ${item.publicFoodCode ? '<span class="badge badge-outline">공공데이터 연동</span>' : ''}
                    </div>
                  </div>
                `).join('')}
              </div>
            </div>
          </div>
        `).join('');
    }

    async function handleAddIngredient(event) {
      event.preventDefault();

      const payload = {
        name: document.getElementById('name').value.trim(),
        category: document.getElementById('category').value,
        quantity: document.getElementById('quantity').value.trim(),
        unit: document.getElementById('unit').value,
        storage: document.getElementById('storage').value,
        expiryDate: document.getElementById('expiryDate').value
      };

      if (!editingIngredientId && selectedFoodSnapshot) {
        Object.assign(payload, selectedFoodSnapshot);
      }

      try {
        if (editingIngredientId) {
          await app.updateIngredient(editingIngredientId, payload);
          app.showToast('재료가 수정되었습니다.', 'success');
        } else {
          await app.addIngredient(payload);
          app.showToast('재료가 추가되었습니다.', 'success');
        }

        closeIngredientModal();
        await renderIngredients();
        renderNotifications();
      } catch (error) {
        app.showToast(error.message || '재료 저장에 실패했습니다.', 'error');
      }
    }

    async function handleDeleteIngredient(id) {
      if (!confirm('이 재료를 삭제하시겠습니까?')) {
        return;
      }

      try {
        await app.deleteIngredient(id);
        await renderIngredients();
        renderNotifications();
      } catch (error) {
        app.showToast(error.message || '재료 삭제에 실패했습니다.', 'error');
      }
    }

    function renderNotifications() {
      const expiring = app.checkExpiringItems();
      const notificationList = document.getElementById('notificationList');
      if (!notificationList) return;

      if (expiring.length === 0) {
        notificationList.innerHTML = '<p class="text-sm text-gray-500">유통기한 임박 재료가 없습니다.</p>';
        return;
      }

      notificationList.innerHTML = expiring.map(item => `
        <div class="p-3 mb-2 rounded-lg" style="background: #fee2e2;">
          <p class="text-sm font-medium">${escapeHtml(item.name)}</p>
          <p class="text-xs" style="color: #991b1b;">
            ${getStorageLabel(item.storage)} · 유통기한: ${escapeHtml(app.formatDate(item.expiryDate))}
          </p>
        </div>
      `).join('');
    }

    document.addEventListener('DOMContentLoaded', async function() {
      if (!(await app.requireAuth())) {
        return;
      }
      await renderIngredients();
      renderNotifications();
    });

    // 드롭다운 닫기 (외부 클릭)
    document.addEventListener('click', function(e) {
      const userMenu = document.querySelector('.user-menu');
      const dropdown = document.getElementById('userMenuDropdown');

      if (userMenu && dropdown && !userMenu.contains(e.target)) {
        dropdown.classList.remove('active');
      }
    });
  </script>
</body>
</html>
