<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나만의 냉장고 - 로그인</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <!-- Logo -->
      <div class="login-logo">
        <div class="login-logo-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
            <rect x="5" y="3" width="14" height="18" rx="2" ry="2"/>
            <line x1="9" y1="7" x2="15" y2="7"/>
            <line x1="9" y1="11" x2="15" y2="11"/>
            <line x1="9" y1="15" x2="15" y2="15"/>
          </svg>
        </div>
        <h1 class="login-logo-text">나만의 냉장고</h1>
        <p class="text-gray-600">냉장고 관리의 새로운 시작</p>
      </div>

      <!-- Login/Signup Card -->
      <div class="card shadow-lg">
        <div class="card-header text-center">
          <h2 class="card-title text-2xl">시작하기</h2>
          <p class="card-description">계정에 로그인하거나 새로 만들어보세요</p>
        </div>
        
        <div class="card-content">
          <!-- Tabs -->
          <div class="tabs">
            <div class="tabs-list">
              <button class="tab-trigger active" data-tab="login" onclick="app.switchTab('login')">로그인</button>
              <button class="tab-trigger" data-tab="signup" onclick="app.switchTab('signup')">회원가입</button>
            </div>

            <!-- Login Tab -->
            <div class="tab-content active" data-tab="login">
              <form onsubmit="event.preventDefault(); app.login(document.getElementById('loginEmail').value, document.getElementById('loginPassword').value);">
                <div class="form-group">
                  <label class="form-label" for="loginEmail">이메일</label>
                  <input type="email" id="loginEmail" class="form-input" placeholder="example@email.com" required>
                </div>

                <div class="form-group">
                  <label class="form-label" for="loginPassword">비밀번호</label>
                  <input type="password" id="loginPassword" class="form-input" placeholder="••••••••" required>
                </div>

                <div class="flex items-center justify-between mb-4" style="font-size: 0.875rem;">
                  <label class="flex items-center gap-2">
                    <input type="checkbox">
                    <span>로그인 유지</span>
                  </label>
                  <a href="#" style="color: #2563eb;">비밀번호 찾기</a>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">로그인</button>
              </form>
            </div>

            <!-- Signup Tab -->
            <div class="tab-content" data-tab="signup">
              <form onsubmit="event.preventDefault(); app.signup(document.getElementById('signupName').value, document.getElementById('signupEmail').value, document.getElementById('signupPassword').value, document.getElementById('signupConfirmPassword').value);">
                <div class="form-group">
                  <label class="form-label" for="signupName">이름</label>
                  <input type="text" id="signupName" class="form-input" placeholder="홍길동" required>
                </div>

                <div class="form-group">
                  <label class="form-label" for="signupEmail">이메일</label>
                  <input type="email" id="signupEmail" class="form-input" placeholder="example@email.com" required>
                </div>

                <div class="form-group">
                  <label class="form-label" for="signupPassword">비밀번호</label>
                  <input type="password" id="signupPassword" class="form-input" placeholder="••••••••" required minlength="8">
                  <p class="text-sm text-gray-500" style="margin-top: 0.25rem;">최소 8자 이상</p>
                </div>

                <div class="form-group">
                  <label class="form-label" for="signupConfirmPassword">비밀번호 확인</label>
                  <input type="password" id="signupConfirmPassword" class="form-input" placeholder="••••••••" required>
                </div>

                <div class="flex items-start gap-2 mb-4" style="font-size: 0.875rem;">
                  <input type="checkbox" required style="margin-top: 0.25rem;">
                  <span>
                    <a href="#" style="color: #2563eb;">이용약관</a> 및 
                    <a href="#" style="color: #2563eb;">개인정보처리방침</a>에 동의합니다.
                  </span>
                </div>

                <button type="submit" class="btn btn-success" style="width: 100%;">회원가입</button>
              </form>
            </div>
          </div>
        </div>
      </div>

      <p class="text-center text-sm text-gray-600 mt-6">프로젝트 데모용 로그인 페이지입니다.</p>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast">
    <span class="toast-message"></span>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
